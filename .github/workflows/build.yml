name: Build Melodix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create app icons
        run: |
          python3 << 'EOF'
          import struct, zlib, os

          def create_png(width, height):
              def chunk(name, data):
                  c = name + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              signature = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              raw = b''
              for _ in range(height):
                  raw += b'\x00' + bytes([29, 185, 84] * width)
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return signature + ihdr + idat + iend

          sizes = {
              'mipmap-mdpi': (48, 48),
              'mipmap-hdpi': (72, 72),
              'mipmap-xhdpi': (96, 96),
              'mipmap-xxhdpi': (144, 144),
              'mipmap-xxxhdpi': (192, 192),
          }
          base = 'android/app/src/main/res'
          for folder, (w, h) in sizes.items():
              os.makedirs(f'{base}/{folder}', exist_ok=True)
              with open(f'{base}/{folder}/ic_launcher.png', 'wb') as f:
                  f.write(create_png(w, h))
              print(f'Created {folder}/ic_launcher.png')
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: melodix-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
