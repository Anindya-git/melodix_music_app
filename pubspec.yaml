name: melodix
description: A premium music player powered by YouTube Music
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # YouTube / Music streaming
  youtube_explode_dart: ^2.2.0
  ytmusic_api: ^1.0.0

  # Audio playback
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.12
  audio_session: ^0.1.18

  # State management
  provider: ^6.1.1
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2

  # UI & Animations
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  glassmorphism: ^3.0.0
  percent_indicator: ^4.2.3

  # Navigation
  go_router: ^12.1.3

  # Networking
  dio: ^5.4.0
  http: ^1.1.0
  connectivity_plus: ^5.0.2

  # Permissions & Device
  permission_handler: ^11.1.0
  device_info_plus: ^9.1.1
  battery_plus: ^5.0.3

  # Media & Files
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  share_plus: ^7.2.1
  url_launcher: ^6.2.3
  on_audio_query: ^2.9.0

  # Utils
  uuid: ^4.3.3
  intl: ^0.18.1
  timeago: ^3.6.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  collection: ^1.18.0
  rxdart: ^0.27.7

  # Icons & Fonts
  cupertino_icons: ^1.0.6
  material_symbols_icons: ^4.2747.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Circular
      fonts:
        - asset: assets/fonts/CircularStd-Book.otf
          weight: 400
        - asset: assets/fonts/CircularStd-Medium.otf
          weight: 500
        - asset: assets/fonts/CircularStd-Bold.otf
          weight: 700
        - asset: assets/fonts/CircularStd-Black.otf
          weight: 900
