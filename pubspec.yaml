name: melodix
description: A premium music player powered by YouTube Music
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # YouTube streaming
  youtube_explode_dart: ^2.2.0

  # Audio
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.12
  audio_session: ^0.1.18

  # State management
  flutter_riverpod: ^2.4.9

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # UI
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+3
  flutter_svg: ^2.0.9

  # Navigation
  go_router: ^12.1.3

  # Network
  dio: ^5.4.0
  http: ^1.1.0
  connectivity_plus: ^5.0.2

  # Permissions
  permission_handler: ^11.1.0
  device_info_plus: ^9.1.1

  # Files
  file_picker: ^6.1.1
  share_plus: ^7.2.1
  url_launcher: ^6.2.3

  # Utils
  uuid: ^4.3.3
  intl: ^0.18.1
  collection: ^1.18.0
  rxdart: ^0.27.7

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
